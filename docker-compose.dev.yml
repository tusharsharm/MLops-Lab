version: '3.8'
services:
  api:
    build:
      context: ./ipc-rag-predictor
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    volumes:
      - ./ipc-rag-predictor/data:/app/data
      - ./ipc-rag-predictor/mlruns:/app/mlruns
      - ./ipc-rag-predictor/app:/app:delegated
    env_file:
      - ./ipc-rag-predictor/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./ipc-rag-predictor
      dockerfile: Dockerfile.simple-frontend
    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      - api

# no named volumes required for dev compose
